name: CI

# Fast pre-merge gate: typecheck + tests. Runs on every PR into master, and is
# reused by android-build.yml so the release artifact can't be built on a red
# tree. Lint runs locally via the pre-push hook (npm run lint), not in CI.
on:
  pull_request:
    branches: [ master ]
  workflow_call:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npm test
